name: CI

on:
  push:
    branches: [ main, new-client ]
  pull_request:
    branches: [ main, new-client ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 40  # Whole-job cap: install + analysis + unit/coverage + mutation (8.5) + functional + benchmark

    strategy:
      matrix:
        # Test 8.1 and 8.2 for now
        php-version: [8.1, 8.2]

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-version }}
        extensions: igbinary, json, mbstring
        coverage: xdebug
        tools: composer:v2

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y netcat-openbsd

    # - name: Get composer cache directory
    #   id: composer-cache
    #   run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    # - name: Cache dependencies
    #   uses: actions/cache@v3
    #   with:
    #     path: ${{ steps.composer-cache.outputs.dir }}
    #     key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
    #     restore-keys: ${{ runner.os }}-composer-

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run static analysis and fast unit tests
      run: composer test

    - name: Start NATS servers
      run: |
        composer nats:start
        sleep 10

        # Wait for all NATS servers to be ready
        echo "Waiting for NATS (plain) on port 4222..."
        timeout 60 bash -c 'until nc -z localhost 4222; do sleep 2; done'
        echo "Waiting for NATS (TLS) on port 4223..."
        timeout 60 bash -c 'until nc -z localhost 4223; do sleep 2; done'
        echo "Waiting for NATS (mTLS) on port 4224..."
        timeout 60 bash -c 'until nc -z localhost 4224; do sleep 2; done'
        echo "All NATS servers are ready"

        # Verify monitoring endpoints
        timeout 10 bash -c 'until curl -f http://localhost:8223/varz > /dev/null 2>&1; do sleep 1; done' || echo "NATS monitoring not available"
        timeout 10 bash -c 'until curl -f http://localhost:8224/varz > /dev/null 2>&1; do sleep 1; done' || echo "NATS TLS monitoring not available"
        timeout 10 bash -c 'until curl -f http://localhost:8225/varz > /dev/null 2>&1; do sleep 1; done' || echo "NATS mTLS monitoring not available"

        # Show container status
        docker ps --filter "name=nats"

    - name: Run unit tests with coverage
      run: composer test:unit

    - name: Check coverage threshold (90%)
      run: composer coverage:check

    - name: Run mutation tests
      if: matrix.php-version == '8.5'
      run: composer test:mutation

    - name: Install functional test dependencies
      run: composer test:functional:setup

    - name: Run functional tests
      timeout-minutes: 25  # Behat suite runs the full matrix (plain/TLS/mTLS) incl. high-volume, large-message and scheduled scenarios
      run: composer test:functional

    - name: Run benchmark tests
      timeout-minutes: 5  # Set explicit timeout for benchmark tests
      env:
        APP_ENV: test
        NATS_DSN: nats://localhost:4222
      run: composer test:benchmark -- --count 1000
      continue-on-error: true  # Don't fail the entire workflow if benchmark fails

    - name: Collect logs on failure
      if: failure()
      run: |
        echo "=== NATS Container Logs ==="
        docker logs nats_test || echo "Could not get NATS plain logs"
        docker logs nats_test_tls || echo "Could not get NATS TLS logs"
        docker logs nats_test_mtls || echo "Could not get NATS mTLS logs"
        echo "=== Docker Containers ==="
        docker ps -a
        echo "=== Network Status ==="
        netstat -tlnp | grep -E ':422[234]' || echo "NATS ports not listening"

    - name: Upload coverage reports
      uses: actions/upload-artifact@v7
      if: matrix.php-version == '8.5'
      with:
        name: coverage-report
        path: |
          clover.xml
          coverage/
        retention-days: 5

    - name: Upload benchmark results
      uses: actions/upload-artifact@v7
      if: matrix.php-version == '8.5'
      with:
        name: benchmark-results
        path: tests/functional/benchmark-*.txt
        retention-days: 5

    - name: Stop NATS server
      if: always()
      run: composer nats:stop
